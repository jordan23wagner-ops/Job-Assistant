  jobs.ashbyhq.com/linear/.../application, structure only — no real applicant data). Includes the
  real "ashby-job-posting-header" class detectATS()'s DOM-marker fallback looks for
  ([class*="ashby"]) -- an earlier version of this fixture used class="application-form" for the
  form wrapper, not realizing that's Lever's OWN detection marker (checked before Ashby's in
  detectATS()'s if-chain), so it silently misdetected as Lever instead. A fourth
  distinct field-matching shape: like Lever, Name is ONE combined field (not separate first/last)
  -- but unlike Lever (matched by its `name` attribute) or Greenhouse (matched by `id`/aria-label),
  Ashby's system fields use a semantic id (`_systemfield_name`, `_systemfield_email`) while its
  CUSTOM questions (LinkedIn here) get a random UUID for both id and name, with a real <label>
  carrying the only usable signal -- purely a labelText() match, nothing in the id/name attributes
  helps at all. Deliberately excludes Ashby's real "Cover letter" (required textarea) and "Github"
  (required text) fields: neither has a standard-field matcher (buildStdMatchers has no github/
  cover-letter entry), so both would fall through to the AI-answered custom-question path, which
  needs a real network call this harness intentionally blocks.
-->
