<!--
  Not modeled on any specific ATS -- a minimal generic application form whose sole purpose is
  exercising the <select> and radio-group fill paths (fillStdSelects/pickSelectOption,
  fillEeoSelects, fillEeoRadios/pickRadio) added in the v1.13.54 (this branch) investigation into
  whether those paths need the same forceTypeValue/execCommand treatment as text inputs got for
  the React cross-world value-tracker revert bug. See autofill.js's comments above fillEeoSelects
  and pickRadio/forceCheck for the full reasoning: selects are NOT tracker-gated by React (left on
  the old sel.value+fire path), while radio/checkbox `checked` IS tracker-gated the same way text
  `.value` was (fixed via forceCheck's el.click()). jsdom has no real React, so this fixture can't
  reproduce the actual cross-world revert either way -- it only proves the matching/selection logic
  picks the right option and ends in the right final DOM state, which forceCheck's el.click() path
  must still do identically to the old checked=true+dispatch path.
-->
<form>
  <div class="field-wrapper">
    <label id="first_name-label" for="first_name">First Name</label>
    <input id="first_name" aria-label="First Name" type="text" value="">
  </div>
  <div class="field-wrapper">
    <label id="last_name-label" for="last_name">Last Name</label>
    <input id="last_name" aria-label="Last Name" type="text" value="">
  </div>
  <div class="field-wrapper">
    <label id="email-label" for="email">Email</label>
    <input id="email" aria-label="Email" type="email" value="">
  </div>

  <div class="field-wrapper">
    <label id="state-label" for="state">State</label>
    <select id="state" aria-label="State">
      <option value="">-- Select --</option>
      <option value="CA">California</option>
      <option value="TX">Texas</option>
      <option value="NY">New York</option>
    </select>
  </div>

  <div class="field-wrapper">
    <label id="gender-label" for="gender">Gender</label>
    <select id="gender" aria-label="Gender">
      <option value="">-- Select --</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
      <option value="decline">Decline to self-identify</option>
    </select>
  </div>

  <fieldset>
    <legend>Veteran Status</legend>
    <label><input type="radio" name="veteran" value="yes"> I identify as a veteran</label>
    <label><input type="radio" name="veteran" value="no"> I am not a veteran</label>
    <label><input type="radio" name="veteran" value="decline"> I don't wish to answer</label>
  </fieldset>

  <div class="application--submit">
    <button type="submit" id="submit_app">Submit Application</button>
  </div>
</form>
