<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alicia — Job Search</title>
  <style>
    :root {
      --bg: #12151c; --panel: #1b1f29; --panel2: #232834; --line: #2c3340;
      --text: #e7ebf3; --muted: #9aa3b2; --accent: #5b8cff; --accent2: #3a4152;
      --good: #4caf50; --warn: #e0a800;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text);
      font: 14px/1.5 -apple-system, Segoe UI, Roboto, sans-serif; }
    .wrap { max-width: 1000px; margin: 0 auto; padding: 24px 20px 60px; }
    header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 4px; }
    header h1 { font-size: 22px; margin: 0; }
    header .sub { color: var(--muted); font-size: 13px; }
    .filters { background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
      padding: 16px; margin: 16px 0; display: grid; gap: 12px;
      grid-template-columns: 1fr 1fr; }
    .filters .full { grid-column: 1 / -1; }
    label.fld { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    input[type=text], input[type=number], select {
      width: 100%; background: var(--panel2); color: var(--text); border: 1px solid var(--line);
      border-radius: 9px; padding: 9px 11px; font-size: 14px; }
    input:focus, select:focus { outline: none; border-color: var(--accent); }
    .row-inline { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
    .chk { display: flex; align-items: center; gap: 7px; color: var(--text); font-size: 13px; cursor: pointer; }
    .btn { cursor: pointer; border: 0; border-radius: 10px; padding: 11px 18px; font-weight: 700;
      background: var(--accent); color: #fff; font-size: 14px; }
    .btn:disabled { opacity: .55; cursor: default; }
    .btn.ghost { background: var(--accent2); color: #cdd3df; font-weight: 600; }
    .status { min-height: 20px; color: var(--muted); font-size: 13px; margin: 6px 2px; }
    .results { display: grid; gap: 12px; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 16px;
      display: grid; grid-template-columns: 54px 1fr auto; gap: 14px; align-items: start; }
    .fit { width: 54px; height: 54px; border-radius: 12px; display: flex; align-items: center;
      justify-content: center; font-weight: 800; font-size: 16px; color: #fff; background: var(--accent2); }
    .card h3 { margin: 0 0 3px; font-size: 16px; }
    .card .meta { color: var(--muted); font-size: 13px; margin-bottom: 6px; }
    .card .tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 7px; }
    .pill { background: var(--panel2); border: 1px solid var(--line); color: var(--muted);
      border-radius: 999px; padding: 2px 10px; font-size: 12px; }
    .pill.salary { color: var(--good); }
    .card .reason { color: var(--muted); font-size: 12.5px; font-style: italic; }
    .card .snippet { color: #c3cad6; font-size: 13px; margin-top: 6px; }
    .card .actions { display: flex; flex-direction: column; gap: 8px; min-width: 130px; }
    .card .actions .btn { width: 100%; text-align: center; padding: 9px 12px; }
    .empty { color: var(--muted); text-align: center; padding: 40px; }
    a { color: var(--accent); }
    @media (max-width: 680px) {
      .filters { grid-template-columns: 1fr; }
      .card { grid-template-columns: 44px 1fr; }
      .card .actions { grid-column: 1 / -1; flex-direction: row; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>⚡ Alicia — Job Search</h1>
      <span class="sub">Find roles by title &amp; industry, ranked by your résumé fit.</span>
    </header>

    <div class="filters">
      <div class="full">
        <label class="fld" for="titles">Job titles (comma-separated)</label>
        <input type="text" id="titles" placeholder="Project Manager, Program Manager">
      </div>
      <div>
        <label class="fld" for="industry">Industry</label>
        <select id="industry"></select>
      </div>
      <div>
        <label class="fld" for="location">Location</label>
        <input type="text" id="location" placeholder="City, state, or ZIP (blank = anywhere)">
      </div>
      <div>
        <label class="fld" for="salaryMin">Minimum salary (USD/yr)</label>
        <input type="number" id="salaryMin" min="0" step="5000" placeholder="e.g. 90000">
      </div>
      <div>
        <label class="fld" for="country">Country</label>
        <select id="country">
          <option value="us" selected>United States</option>
          <option value="gb">United Kingdom</option>
          <option value="ca">Canada</option>
          <option value="au">Australia</option>
        </select>
      </div>
      <div class="full row-inline">
        <label class="chk"><input type="checkbox" id="remote"> Remote only</label>
        <label class="chk"><input type="checkbox" id="fullTime" checked> Full-time</label>
        <label class="chk"><input type="checkbox" id="deepFit" checked> Rank by résumé fit (AI)</label>
        <button class="btn" id="searchBtn" style="margin-left:auto;">Search jobs</button>
      </div>
    </div>

    <div class="status" id="status"></div>
    <div class="results" id="results"></div>
    <div class="empty" id="empty">Enter a title or pick an industry, then Search.</div>
  </div>

  <script src="jobsearch.js"></script>
</body>
</html>
