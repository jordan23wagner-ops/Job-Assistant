<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tailored Resume - Alicia AI</title>
  <style>
    @page { size: letter; margin: 0.5in 0.6in; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Calibri, 'Segoe UI', Arial, sans-serif; font-size: 10.5pt; line-height: 1.35; color: #222; background: #f5f5f5; }
    .print-bar {
      position: fixed; top: 0; left: 0; right: 0;
      background: #1a1a2e; padding: 10px 20px;
      display: flex; gap: 12px; align-items: center;
      z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .print-bar button {
      background: #7c83ff; color: #fff; border: none;
      padding: 8px 20px; border-radius: 6px; cursor: pointer;
      font-size: 14px; font-weight: 600;
    }
    .print-bar button:hover { background: #6a70e0; }
    .print-bar span { color: #aaa; font-size: 13px; }
    .resume-page {
      max-width: 8.5in; margin: 60px auto 40px; background: #fff;
      padding: 0.5in 0.6in; box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      min-height: 11in;
    }
    h1 { font-size: 24pt; text-align: center; color: #1a1a1a; letter-spacing: 1px; margin-bottom: 4px; }
    h1 + p { text-align: center; font-size: 10pt; color: #444; margin-bottom: 10px; }
    h2 {
      font-size: 11pt; font-weight: 700; color: #2a5a8a;
      text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 2px solid #2a5a8a; padding-bottom: 2px;
      margin-top: 14px; margin-bottom: 6px;
    }
    h3 { font-size: 10.5pt; font-weight: 700; color: #1a1a1a; margin-top: 8px; margin-bottom: 1px; }
    .date { font-size: 9.5pt; color: #666; font-style: italic; margin-bottom: 3px; }
    p { font-size: 10.5pt; margin-bottom: 3px; color: #333; }
    ul { list-style: disc; margin-left: 18px; margin-bottom: 6px; }
    li { font-size: 10pt; color: #333; margin-bottom: 2px; }
    strong { color: #1a1a1a; }
    @media print {
      .print-bar { display: none !important; }
      body { background: #fff; }
      .resume-page { margin: 0; box-shadow: none; padding: 0; }
    }
  </style>
</head>
<body>
  <div class="print-bar">
    <button id="print-btn">Save as PDF</button>
    <span>Print this page to save your tailored resume as a PDF</span>
  </div>
  <div class="resume-page" id="resume-content">
    <p style="color:#888; text-align:center; padding-top:2in;">Loading resume...</p>
  </div>
  <script src="resume-preview.js"></script>
</body>
</html>
